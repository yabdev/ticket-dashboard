spring.application.name=dashboard
# -- Server Port Configuration --
server.port=8081

# -- Database Connection Configuration --
# The JDBC URL for your Oracle database.
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:ORCL
spring.datasource.username=ITHELPDESK
spring.datasource.password=1234
# The Oracle JDBC driver class.
spring.datasource.driver-class-name=oracle.jdbc.driver.OracleDriver

# -- JPA and Hibernate Configuration --
# This tells Hibernate (the JPA provider) which SQL dialect to use for Oracle.
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
# This will show the SQL queries Hibernate generates in the console. Very useful for debugging.
spring.jpa.show-sql=true
# This formats the SQL in the console to be more readable.
spring.jpa.properties.hibernate.format_sql=true
# This setting tells Hibernate what to do with the database schema. 'update' will try to update it based on your code.
# For production, we'd use something safer like 'validate' or a migration tool like Flyway.
# This tells Hibernate to not try and create/modify tables. 'validate' checks if the tables match the entities.
spring.jpa.hibernate.ddl-auto=validate